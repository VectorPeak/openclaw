name: Plugin NPM Release

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/plugin-npm-release.yml"
      - "extensions/**"
      - "package.json"
      - "scripts/lib/plugin-npm-package-manifest.mjs"
      - "scripts/lib/plugin-npm-release.ts"
      - "scripts/plugin-npm-publish.sh"
      - "scripts/plugin-npm-release-check.ts"
      - "scripts/plugin-npm-release-plan.ts"
      - "scripts/verify-plugin-npm-published-runtime.mjs"
  workflow_dispatch:
    inputs:
      publish_scope:
        description: Publish the selected plugins or all publishable plugins from the ref
        required: true
        default: selected
        type: choice
        options:
          - selected
          - all-publishable
      ref:
        description: Commit SHA on main, a release branch, or the matching Tideclaw alpha branch to publish from
        required: true
        type: string
      plugins:
        description: Comma-separated plugin package names to publish when publish_scope=selected
        required: false
        type: string
      release_publish_run_id:
        description: Approved OpenClaw Release Publish workflow run id
        required: false
        type: string
      bootstrap_empty:
        description: Publish an empty 0.0.0 placeholder for one selected release-enabled plugin
        required: false
        default: false
        type: boolean

concurrency:
  group: plugin-npm-release-${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_VERSION: "24.15.0"

jobs:
  preview_plugins_npm:
    if: github.event_name != 'workflow_dispatch' || inputs.bootstrap_empty != true
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      ref_revision: ${{ steps.ref.outputs.sha }}
      has_candidates: ${{ steps.plan.outputs.has_candidates }}
      candidate_count: ${{ steps.plan.outputs.candidate_count }}
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.sha }}
          fetch-depth: 0

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          node-version: ${{ env.NODE_VERSION }}
          install-bun: "false"

      - name: Resolve checked-out ref
        id: ref
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Validate ref is on a trusted publish branch
        env:
          WORKFLOW_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin \
            +refs/heads/main:refs/remotes/origin/main \
            '+refs/heads/release/*:refs/remotes/origin/release/*'
          if git merge-base --is-ancestor HEAD origin/main; then
            exit 0
          fi
          while IFS= read -r release_ref; do
            if git merge-base --is-ancestor HEAD "${release_ref}"; then
              exit 0
            fi
          done < <(git for-each-ref --format='%(refname)' refs/remotes/origin/release)
          if [[ "${WORKFLOW_REF}" =~ ^refs/heads/tideclaw/alpha/[0-9]{4}-[0-9]{2}-[0-9]{2}-[0-9]{4}Z$ ]]; then
            alpha_branch="${WORKFLOW_REF#refs/heads/}"
            git fetch --no-tags origin "+refs/heads/${alpha_branch}:refs/remotes/origin/${alpha_branch}"
            if git merge-base --is-ancestor HEAD "refs/remotes/origin/${alpha_branch}"; then
              exit 0
            fi
          fi
          echo "Plugin npm publishes must target a commit reachable from main, release/*, or the matching Tideclaw alpha branch." >&2
          exit 1

      - name: Validate publishable plugin metadata
        env:
          PUBLISH_SCOPE: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_scope || '' }}
          RELEASE_PLUGINS: ${{ github.event_name == 'workflow_dispatch' && inputs.plugins || '' }}
          BASE_REF: ${{ github.event_name != 'workflow_dispatch' && github.event.before || '' }}
          HEAD_REF: ${{ steps.ref.outputs.sha }}
        run: |
          set -euo pipefail
          if [[ -n "${PUBLISH_SCOPE}" ]]; then
            release_args=(--selection-mode "${PUBLISH_SCOPE}")
            if [[ -n "${RELEASE_PLUGINS}" ]]; then
              release_args+=(--plugins "${RELEASE_PLUGINS}")
            fi
            pnpm release:plugins:npm:check -- "${release_args[@]}"
          elif [[ -n "${BASE_REF}" ]]; then
            pnpm release:plugins:npm:check -- --base-ref "${BASE_REF}" --head-ref "${HEAD_REF}"
          else
            pnpm release:plugins:npm:check
          fi

      - name: Resolve plugin release plan
        id: plan
        env:
          PUBLISH_SCOPE: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_scope || '' }}
          RELEASE_PLUGINS: ${{ github.event_name == 'workflow_dispatch' && inputs.plugins || '' }}
          BASE_REF: ${{ github.event_name != 'workflow_dispatch' && github.event.before || '' }}
          HEAD_REF: ${{ steps.ref.outputs.sha }}
        run: |
          set -euo pipefail
          mkdir -p .local
          if [[ -n "${PUBLISH_SCOPE}" ]]; then
            plan_args=(--selection-mode "${PUBLISH_SCOPE}")
            if [[ -n "${RELEASE_PLUGINS}" ]]; then
              plan_args+=(--plugins "${RELEASE_PLUGINS}")
            fi
            node --import tsx scripts/plugin-npm-release-plan.ts "${plan_args[@]}" > .local/plugin-npm-release-plan.json
          elif [[ -n "${BASE_REF}" ]]; then
            node --import tsx scripts/plugin-npm-release-plan.ts --base-ref "${BASE_REF}" --head-ref "${HEAD_REF}" > .local/plugin-npm-release-plan.json
          else
            node --import tsx scripts/plugin-npm-release-plan.ts > .local/plugin-npm-release-plan.json
          fi

          cat .local/plugin-npm-release-plan.json

          candidate_count="$(jq -r '.candidates | length' .local/plugin-npm-release-plan.json)"
          has_candidates="false"
          if [[ "${candidate_count}" != "0" ]]; then
            has_candidates="true"
          fi
          matrix_json="$(jq -c '.candidates' .local/plugin-npm-release-plan.json)"

          {
            echo "candidate_count=${candidate_count}"
            echo "has_candidates=${has_candidates}"
            echo "matrix=${matrix_json}"
          } >> "$GITHUB_OUTPUT"

          echo "Plugin release candidates:"
          jq -r '.candidates[]? | "- \(.packageName)@\(.version) [\(.publishTag)] from \(.packageDir)"' .local/plugin-npm-release-plan.json

          echo "Already published / skipped:"
          jq -r '.skippedPublished[]? | "- \(.packageName)@\(.version)"' .local/plugin-npm-release-plan.json

      - name: Validate Tideclaw alpha plugin channels
        if: startsWith(github.ref, 'refs/heads/tideclaw/alpha/')
        run: |
          set -euo pipefail
          invalid="$(
            jq -r '.candidates[]? | select(.publishTag != "alpha" or .channel != "alpha") | "- \(.packageName)@\(.version) [\(.publishTag)]"' .local/plugin-npm-release-plan.json
          )"
          if [[ -n "${invalid}" ]]; then
            echo "Tideclaw alpha plugin npm publishes may only publish alpha plugin versions." >&2
            printf '%s\n' "${invalid}" >&2
            exit 1
          fi

  validate_release_publish_approval:
    name: Validate release publish approval
    needs: preview_plugins_npm
    if: github.event_name == 'workflow_dispatch' && inputs.bootstrap_empty != true && needs.preview_plugins_npm.outputs.has_candidates == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Validate release publish approval run
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_PUBLISH_RUN_ID: ${{ inputs.release_publish_run_id }}
          EXPECTED_WORKFLOW_BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [[ -z "${RELEASE_PUBLISH_RUN_ID// }" ]]; then
            if [[ "${GITHUB_ACTOR}" == "github-actions[bot]" ]]; then
              echo "Plugin npm publish dispatched by another workflow must include release_publish_run_id." >&2
              exit 1
            fi
            echo "Direct Plugin NPM Release dispatch; relying on this workflow's npm-release environment approval."
            exit 0
          fi
          direct_recovery=false
          if [[ "${GITHUB_ACTOR}" != "github-actions[bot]" ]]; then
            direct_recovery=true
            echo "Direct Plugin NPM Release recovery with release_publish_run_id; relying on this workflow's npm-release environment approval."
          fi
          RUN_JSON="$(gh run view "$RELEASE_PUBLISH_RUN_ID" --repo "$GITHUB_REPOSITORY" --json workflowName,headBranch,event,status,conclusion,url)"
          printf '%s' "$RUN_JSON" | DIRECT_RELEASE_RECOVERY="${direct_recovery}" node scripts/validate-release-publish-approval.mjs

  preview_plugin_pack:
    needs: preview_plugins_npm
    if: inputs.bootstrap_empty != true && needs.preview_plugins_npm.outputs.has_candidates == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJson(needs.preview_plugins_npm.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          ref: ${{ needs.preview_plugins_npm.outputs.ref_revision }}
          fetch-depth: 1

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          node-version: ${{ env.NODE_VERSION }}
          install-bun: "false"

      - name: Preview publish command
        run: bash scripts/plugin-npm-publish.sh --dry-run "${{ matrix.plugin.packageDir }}"

      - name: Preview npm pack contents
        run: bash scripts/plugin-npm-publish.sh --pack-dry-run "${{ matrix.plugin.packageDir }}"

  publish_plugins_npm:
    needs: [preview_plugins_npm, preview_plugin_pack, validate_release_publish_approval]
    if: github.event_name == 'workflow_dispatch' && inputs.bootstrap_empty != true && needs.preview_plugins_npm.outputs.has_candidates == 'true'
    runs-on: ubuntu-latest
    environment: npm-release
    permissions:
      actions: read
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJson(needs.preview_plugins_npm.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          ref: ${{ needs.preview_plugins_npm.outputs.ref_revision }}
          fetch-depth: 1

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          node-version: ${{ env.NODE_VERSION }}
          install-bun: "false"

      - name: Check npm package version
        id: npm_package_version
        env:
          PACKAGE_NAME: ${{ matrix.plugin.packageName }}
          PACKAGE_VERSION: ${{ matrix.plugin.version }}
        run: |
          set -euo pipefail
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published on npm."
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.npm_package_version.outputs.already_published != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          OPENCLAW_NPM_PUBLISH_AUTH_MODE: trusted-publisher
        run: bash scripts/plugin-npm-publish.sh --publish "${{ matrix.plugin.packageDir }}"

      - name: Verify published runtime
        env:
          PACKAGE_NAME: ${{ matrix.plugin.packageName }}
          PACKAGE_VERSION: ${{ matrix.plugin.version }}
        run: node scripts/verify-plugin-npm-published-runtime.mjs "${PACKAGE_NAME}@${PACKAGE_VERSION}"

  resolve_empty_npm_placeholder:
    name: Resolve empty npm placeholder
    if: github.event_name == 'workflow_dispatch' && inputs.bootstrap_empty == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      package_name: ${{ steps.placeholder.outputs.package_name }}
      already_published: ${{ steps.placeholder.outputs.already_published }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Validate ref is on a trusted publish branch
        env:
          WORKFLOW_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin \
            +refs/heads/main:refs/remotes/origin/main \
            '+refs/heads/release/*:refs/remotes/origin/release/*'
          if git merge-base --is-ancestor HEAD origin/main; then
            exit 0
          fi
          while IFS= read -r release_ref; do
            if git merge-base --is-ancestor HEAD "${release_ref}"; then
              exit 0
            fi
          done < <(git for-each-ref --format='%(refname)' refs/remotes/origin/release)
          echo "Empty npm placeholders must target a commit reachable from main or release/*." >&2
          exit 1

      - name: Resolve selected placeholder package
        id: placeholder
        env:
          PUBLISH_SCOPE: ${{ inputs.publish_scope }}
          RELEASE_PLUGINS: ${{ inputs.plugins }}
        run: |
          set -euo pipefail
          if [[ "${PUBLISH_SCOPE}" != "selected" ]]; then
            echo "Empty npm placeholders require publish_scope=selected." >&2
            exit 1
          fi

          node --input-type=module <<'EOF' > "$RUNNER_TEMP/empty-npm-placeholder.json"
          import fs from "node:fs";
          import path from "node:path";

          const selected = (process.env.RELEASE_PLUGINS ?? "")
            .split(",")
            .map((value) => value.trim())
            .filter(Boolean);
          if (selected.length !== 1) {
            throw new Error("Empty npm placeholders require exactly one selected plugin package.");
          }

          const packageName = selected[0];
          if (!packageName.startsWith("@openclaw/")) {
            throw new Error(`Empty npm placeholders must use an @openclaw package: ${packageName}`);
          }

          const match = fs
            .readdirSync("extensions", { withFileTypes: true })
            .filter((entry) => entry.isDirectory())
            .map((entry) => path.join("extensions", entry.name, "package.json"))
            .filter((packageJsonPath) => fs.existsSync(packageJsonPath))
            .map((packageJsonPath) => ({
              packageDir: path.dirname(packageJsonPath),
              packageJson: JSON.parse(fs.readFileSync(packageJsonPath, "utf8")),
            }))
            .find(
              ({ packageJson }) =>
                packageJson.name === packageName && packageJson.openclaw?.release?.publishToNpm === true,
            );
          if (!match) {
            throw new Error(
              `Selected package ${packageName} is not a release-enabled OpenClaw plugin manifest.`,
            );
          }

          const registryResponse = await fetch(
            `https://registry.npmjs.org/${encodeURIComponent(match.packageJson.name)}`,
          );
          if (registryResponse.status === 404) {
            process.stdout.write(
              `${JSON.stringify({ packageName: match.packageJson.name, alreadyPublished: false })}\n`,
            );
            process.exit(0);
          }
          if (!registryResponse.ok) {
            throw new Error(
              `Could not read npm package metadata for ${match.packageJson.name}: ${registryResponse.status}.`,
            );
          }

          const registryPackage = await registryResponse.json();
          const publishedVersions =
            typeof registryPackage === "object" &&
            registryPackage !== null &&
            typeof registryPackage.versions === "object" &&
            registryPackage.versions !== null
              ? Object.keys(registryPackage.versions)
              : [];
          if (publishedVersions.some((version) => version !== "0.0.0")) {
            throw new Error(
              `${match.packageJson.name} already has published npm versions; refusing to add a placeholder.`,
            );
          }

          process.stdout.write(
            `${JSON.stringify({
              packageName: match.packageJson.name,
              alreadyPublished: publishedVersions.includes("0.0.0"),
            })}\n`,
          );
          EOF

          package_name="$(jq -r '.packageName' "$RUNNER_TEMP/empty-npm-placeholder.json")"
          already_published="$(jq -r '.alreadyPublished' "$RUNNER_TEMP/empty-npm-placeholder.json")"
          {
            echo "package_name=${package_name}"
            echo "already_published=${already_published}"
          } >> "$GITHUB_OUTPUT"

  publish_empty_npm_placeholder:
    name: Publish empty npm placeholder
    needs: resolve_empty_npm_placeholder
    if: github.event_name == 'workflow_dispatch' && inputs.bootstrap_empty == true
    runs-on: ubuntu-latest
    environment: npm-release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          node-version: ${{ env.NODE_VERSION }}
          install-bun: "false"
          install-deps: "false"
          use-actions-cache: "false"

      - name: Install npm trusted-publishing CLI
        run: npm install --global npm@11.16.0

      - name: Create empty package
        id: package
        env:
          PACKAGE_NAME: ${{ needs.resolve_empty_npm_placeholder.outputs.package_name }}
        run: |
          set -euo pipefail
          package_dir="$RUNNER_TEMP/empty-npm-placeholder"
          mkdir -p "${package_dir}"
          PACKAGE_DIR="${package_dir}" node --input-type=module <<'EOF'
          import fs from "node:fs";
          import path from "node:path";

          const packageDir = process.env.PACKAGE_DIR;
          const packageName = process.env.PACKAGE_NAME;
          if (!packageDir || !packageName) {
            throw new Error("Missing empty npm placeholder package inputs.");
          }

          fs.writeFileSync(
            path.join(packageDir, "package.json"),
            `${JSON.stringify(
              {
                name: packageName,
                version: "0.0.0",
                description: "Reserved package name for a future OpenClaw plugin release.",
                license: "MIT",
                repository: {
                  type: "git",
                  url: "https://github.com/openclaw/openclaw",
                },
                files: ["README.md"],
              },
              null,
              2,
            )}\n`,
          );
          fs.writeFileSync(
            path.join(packageDir, "README.md"),
            `# ${packageName}\n\nThis intentionally empty package reserves the name for a future OpenClaw plugin release.\n`,
          );
          EOF
          echo "package_dir=${package_dir}" >> "$GITHUB_OUTPUT"

      - name: Preview empty package contents
        env:
          PACKAGE_DIR: ${{ steps.package.outputs.package_dir }}
        run: |
          set -euo pipefail
          cd "${PACKAGE_DIR}"
          npm pack --dry-run --json --ignore-scripts

      - name: Publish empty placeholder
        if: needs.resolve_empty_npm_placeholder.outputs.already_published != 'true'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          PACKAGE_DIR: ${{ steps.package.outputs.package_dir }}
        run: |
          set -euo pipefail
          : "${NPM_TOKEN:?NPM_TOKEN is required for the initial npm package publish.}"
          npmrc="$(mktemp)"
          trap 'rm -f "${npmrc}"' EXIT
          chmod 0600 "${npmrc}"
          printf '%s\n' "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > "${npmrc}"
          cd "${PACKAGE_DIR}"
          NPM_CONFIG_USERCONFIG="${npmrc}" npm publish --access public --tag placeholder --provenance

      - name: Configure or verify npm trusted publisher
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          PACKAGE_NAME: ${{ needs.resolve_empty_npm_placeholder.outputs.package_name }}
        run: |
          set -euo pipefail
          : "${NPM_TOKEN:?NPM_TOKEN is required to configure npm trusted publishing.}"
          npmrc="$(mktemp)"
          trap 'rm -f "${npmrc}"' EXIT
          chmod 0600 "${npmrc}"
          printf '%s\n' "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > "${npmrc}"
          trust_config="$(NPM_CONFIG_USERCONFIG="${npmrc}" npm trust list "${PACKAGE_NAME}" --json)"
          if [[ -n "${trust_config//[[:space:]]/}" ]]; then
            if ! jq -e '
              .type == "github" and
              .repository == env.GITHUB_REPOSITORY and
              .file == "plugin-npm-release.yml" and
              .environment == "npm-release" and
              ((.permissions // []) | index("createPackage") != null)
            ' <<<"${trust_config}" >/dev/null; then
              echo "Existing npm trusted publisher does not match this release workflow." >&2
              exit 1
            fi
            exit 0
          fi
          NPM_CONFIG_USERCONFIG="${npmrc}" npm trust github "${PACKAGE_NAME}" \
              --repository "${GITHUB_REPOSITORY}" \
              --file plugin-npm-release.yml \
              --environment npm-release \
              --allow-publish \
              --yes

      - name: Verify empty placeholder
        env:
          PACKAGE_NAME: ${{ needs.resolve_empty_npm_placeholder.outputs.package_name }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          published_version="$(npm view "${PACKAGE_NAME}@0.0.0" version)"
          placeholder_tag="$(npm view "${PACKAGE_NAME}" dist-tags.placeholder)"
          if [[ "${published_version}" != "0.0.0" || "${placeholder_tag}" != "0.0.0" ]]; then
            echo "Expected ${PACKAGE_NAME}@0.0.0 to be published only under the placeholder dist-tag." >&2
            exit 1
          fi
          : "${NPM_TOKEN:?NPM_TOKEN is required to verify npm trusted publishing.}"
          npmrc="$(mktemp)"
          trap 'rm -f "${npmrc}"' EXIT
          chmod 0600 "${npmrc}"
          printf '%s\n' "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > "${npmrc}"
          trust_config="$(NPM_CONFIG_USERCONFIG="${npmrc}" npm trust list "${PACKAGE_NAME}" --json)"
          if ! jq -e '
            .type == "github" and
            .repository == env.GITHUB_REPOSITORY and
            .file == "plugin-npm-release.yml" and
            .environment == "npm-release" and
            ((.permissions // []) | index("createPackage") != null)
          ' <<<"${trust_config}" >/dev/null; then
            echo "npm trusted publisher does not match this release workflow." >&2
            exit 1
          fi
